{% extends "base.html" %}

{% block content %}

<div class="checkout-container">
    <h1>Checkout</h1>
    
    <div class="checkout-grid">
        <!-- Order Summary -->
        <div class="order-summary">
            <h2>Your Order</h2>
            <div id="cart-items">
                {% for item in cartItems %}
                    <div class="cart-item">
                        <span>{{ item.Name }}</span>
                        <span>{{ item.Price }}</span>
                        {% if 'DLCID' in item %}
                            <a href="/rmcart/{{ item.DLCID }}/dlc">[-]</a>
                        {% elif 'GameID' in item %}
                            <a href="/rmcart/{{ item.GameID }}/game">[-]</a>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <div class="total">
                <strong>Total: ${{ totalCost }}</strong>
            </div>
        </div>

        <!-- Payment Form -->
        <div class="payment-form">
            <h2>Payment Details</h2>
            <form id="checkout-form" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry (MM/YY)</label>
                        <input type="text" placeholder="MM/YY" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" placeholder="123" required>
                    </div>
                </div>
                <input type="submit" class="order-btn" value="Place Order">
            </form>
        </div>
    </div>
</div>

<style>
    .checkout-container {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1rem;
    }
    
    .checkout-container h1 {
        margin-bottom: 1.5rem;
        color: #13172b;
    }
    
    .checkout-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
    }
    
    .order-summary, .payment-form {
        background: #13172b;
        border-radius: 1rem;
        padding: 1.5rem;
        border: 1px solid #2d334f;
    }
    
    h2 {
        margin-bottom: 1rem;
        font-size: 1.3rem;
        color: #cbd5e6;
    }
    
    .cart-item {
        display: flex;
        justify-content: space-between;
        padding: 0.75rem 0;
        border-bottom: 1px solid #2d334f;
    }
    
    .total {
        margin-top: 1rem;
        padding-top: 1rem;
        text-align: right;
        font-size: 1.2rem;
        border-top: 2px solid #4f46e5;
    }
    
    .form-group {
        margin-bottom: 1rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 0.85rem;
        color: #b9c0e0;
    }
    
    .form-group input {
        width: 100%;
        background: #0f1222;
        border: 1px solid #2d334f;
        border-radius: 0.5rem;
        padding: 0.6rem;
        color: white;
    }
    
    .form-row {
        display: flex;
        gap: 1rem;
    }
    
    .form-row .form-group {
        flex: 1;
    }
    
    .order-btn {
        width: 100%;
        background: #4f46e5;
        border: none;
        padding: 0.75rem;
        border-radius: 0.5rem;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 0.5rem;
    }
    
    .order-btn:hover {
        background: #7c3aed;
    }
    
    @media (max-width: 700px) {
        .checkout-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

    });
</script> -->

{% endblock %}
