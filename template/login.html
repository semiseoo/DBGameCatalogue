{% extends "base.html" %}

{% block content %}

<h1>Login</h1>

<div class="login-form">
    <form method="POST">
    <input type="text" name="username" placeholder="Username">
    <input type="password" name="password" placeholder="Password">
    <button type="submit">Login</button>
    </form>
    <br>
    <a href="/register">
        <button type="button"> Register </button>
    </a>
</div>

{% endblock %}
